<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />

    <!-- Primary Meta -->
    <title>Bloodify247 - Blood Donation Platform</title>
    <meta name="description" content="Bloodify247 connects blood donors and seekers in Beanibazar Upazila, Sylhet. Find A+, B+, O+, AB+ blood donors, check cooldown states, and post emergency requests." />

    <!-- Mobile Browser Theme -->
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- Apple / Safari iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blood Donate" />
    <meta name="format-detection" content="telephone=yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22none%22><defs><linearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 stop-color=%22%23ef4444%22/><stop offset=%22100%25%22 stop-color=%22%23f43f5e%22/></linearGradient></defs><path d=%22M50 12C50 12 22 45 22 65C22 80.46 34.54 93 50 93C65.46 93 78 80.46 78 65C78 45 50 12 50 12Z%22 fill=%22url(%23g)%22/><path d=%22M32 65h10l4-18 5 32 4-22 4 8h9%22 stroke=%22%23ffffff%22 stroke-width=%226%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22none%22><defs><linearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 stop-color=%22%23ef4444%22/><stop offset=%22100%25%22 stop-color=%22%23f43f5e%22/></linearGradient></defs><path d=%22M50 12C50 12 22 45 22 65C22 80.46 34.54 93 50 93C65.46 93 78 80.46 78 65C78 45 50 12 50 12Z%22 fill=%22url(%23g)%22/><path d=%22M32 65h10l4-18 5 32 4-22 4 8h9%22 stroke=%22%23ffffff%22 stroke-width=%226%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect: establish early connections to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Google Fonts: preload asynchronously so first paint is not blocked on mobile networks -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />
    </noscript>
    
    <!-- Theme check initialization to prevent flashes on reload -->
    <script>
      (function() {
        var theme = 'light';
        try {
          theme = localStorage.getItem('theme') || 'light';
        } catch (e) {}
        var isDark = theme === 'dark';
        var bg = isDark ? '#0a0a0a' : '#fafafa';
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        document.documentElement.style.backgroundColor = bg;
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>

    <style>
      html {
        min-height: 100%;
        min-height: 100dvh;
        background-color: #fafafa;
      }

      html.dark {
        background-color: #0a0a0a;
      }

      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background-color: inherit;
      }

      body.preloader-active {
        overflow: hidden;
        touch-action: none;
        padding: 0 !important;
        overscroll-behavior: none;
      }

      @keyframes preloader-enter {
        from {
          opacity: 0;
          transform: translate3d(0, 14px, 0) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1);
        }
      }

      @keyframes preloader-heartbeat {
        0%, 100% { transform: scale(1); }
        16% { transform: scale(1.07); }
        32% { transform: scale(1); }
        48% { transform: scale(1.04); }
        64% { transform: scale(1); }
      }

      @keyframes preloader-ripple {
        0% {
          opacity: 0.55;
          transform: scale(0.88);
        }
        100% {
          opacity: 0;
          transform: scale(1.75);
        }
      }

      @keyframes preloader-bar {
        0% { transform: translate3d(-110%, 0, 0); }
        100% { transform: translate3d(280%, 0, 0); }
      }

      @keyframes preloader-shimmer {
        0%, 100% { background-position: 0% center; }
        50% { background-position: 100% center; }
      }

      .static-preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: transparent;
        color: #18181b;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.45s ease, visibility 0.45s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .static-preloader__backdrop {
        position: fixed;
        top: -25vh;
        left: -10vw;
        right: -10vw;
        bottom: -25vh;
        background: #fafafa;
        z-index: 0;
        pointer-events: none;
      }

      .static-preloader::before {
        content: "";
        position: fixed;
        top: -25vh;
        left: -10vw;
        right: -10vw;
        bottom: -25vh;
        pointer-events: none;
        z-index: 1;
        background:
          radial-gradient(ellipse 90% 55% at 50% -15%, rgba(239, 68, 68, 0.14), transparent 70%),
          radial-gradient(ellipse 55% 45% at 100% 100%, rgba(244, 63, 94, 0.09), transparent 65%),
          radial-gradient(ellipse 45% 40% at 0% 85%, rgba(239, 68, 68, 0.06), transparent 60%);
      }

      .static-preloader--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .static-preloader--hide .static-preloader__inner {
        opacity: 0;
        transform: translate3d(0, -8px, 0) scale(0.98);
      }

      .static-preloader__inner {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 384px;
        padding:
          max(24px, env(safe-area-inset-top))
          max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(24px, env(safe-area-inset-left));
        text-align: center;
        transition: opacity 0.45s ease, transform 0.45s ease;
        animation: preloader-enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .static-preloader__logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        margin-bottom: 22px;
      }

      .static-preloader__logo-wrap::before,
      .static-preloader__logo-wrap::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 50%;
        border: 2px solid rgba(239, 68, 68, 0.32);
        animation: preloader-ripple 2.2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
        will-change: transform, opacity;
      }

      .static-preloader__logo-wrap::after {
        animation-delay: 1.1s;
      }

      .static-preloader__logo {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 68px;
        height: 68px;
        border-radius: 22px;
        background: linear-gradient(135deg, #ef4444, #f43f5e);
        box-shadow: 0 18px 36px -18px rgba(239, 68, 68, 0.45);
        animation: preloader-heartbeat 1.9s ease-in-out infinite;
        will-change: transform;
      }

      .static-preloader__logo svg {
        width: 40px;
        height: 40px;
      }

      .static-preloader__copy {
        animation: preloader-enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.12s both;
      }

      .static-preloader__title {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.02em;
        margin: 0 0 10px 0;
        display: flex;
        align-items: center;
        gap: 6px;
        justify-content: center;
      }

      .static-preloader__brand {
        background: linear-gradient(90deg, #ef4444, #f43f5e, #fb7185, #ef4444);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: preloader-shimmer 4s ease-in-out infinite;
      }

      .static-title-blood {
        font-weight: 800;
        color: #18181b;
      }

      .static-preloader__tagline {
        font-size: 11px;
        font-weight: 700;
        color: rgba(239, 68, 68, 0.75);
        text-transform: uppercase;
        letter-spacing: 0.22em;
        margin: 0;
      }

      .static-preloader__tagline a {
        color: inherit;
        text-decoration: none;
      }

      .static-preloader__bar {
        position: fixed;
        z-index: 2;
        bottom: max(36px, calc(env(safe-area-inset-bottom) + 20px));
        left: 50%;
        width: min(148px, 42vw);
        height: 3px;
        border-radius: 999px;
        background: rgba(239, 68, 68, 0.14);
        overflow: hidden;
        transform: translate3d(-50%, 0, 0);
      }

      .static-preloader__bar-fill {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, #ef4444, #f43f5e, transparent);
        animation: preloader-bar 1.15s ease-in-out infinite;
        will-change: transform;
      }

      .dark .static-preloader {
        color: #fafafa;
      }

      .dark .static-preloader__backdrop {
        background: #0a0a0a;
      }

      .dark .static-preloader::before {
        background:
          radial-gradient(ellipse 90% 55% at 50% -15%, rgba(239, 68, 68, 0.2), transparent 70%),
          radial-gradient(ellipse 55% 45% at 100% 100%, rgba(244, 63, 94, 0.12), transparent 65%),
          radial-gradient(ellipse 45% 40% at 0% 85%, rgba(239, 68, 68, 0.08), transparent 60%);
      }

      .dark .static-preloader__logo-wrap::before,
      .dark .static-preloader__logo-wrap::after {
        border-color: rgba(248, 113, 113, 0.35);
      }

      .dark .static-title-blood {
        color: #fafafa;
      }

      .dark .static-preloader__bar {
        background: rgba(248, 113, 113, 0.18);
      }

      @media (prefers-reduced-motion: reduce) {
        .static-preloader,
        .static-preloader__inner {
          transition: none;
        }

        .static-preloader__inner,
        .static-preloader__copy,
        .static-preloader__logo,
        .static-preloader__logo-wrap::before,
        .static-preloader__logo-wrap::after,
        .static-preloader__brand,
        .static-preloader__bar-fill {
          animation: none !important;
        }

        .static-preloader--hide .static-preloader__inner {
          transform: none;
        }
      }
    </style>
  </head>
  <body class="preloader-active">
    <script>window.__PRELOADER_START__ = performance.now();</script>

    <!-- Lightweight static shell shown while the JS bundle downloads -->
    <div id="static-preloader" class="static-preloader" role="status" aria-live="polite" aria-label="Loading Bloodify247">
      <div class="static-preloader__backdrop" aria-hidden="true"></div>
      <div class="static-preloader__inner">
        <div class="static-preloader__logo-wrap">
          <div class="static-preloader__logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
              <path d="M50 12C50 12 22 45 22 65C22 80.46 34.54 93 50 93C65.46 93 78 80.46 78 65C78 45 50 12 50 12Z" fill="#ffffff" />
              <path d="M32 65h10l4-18 5 32 4-22 4 8h9" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
        </div>

        <div class="static-preloader__copy">
          <h1 class="static-preloader__title">
            <span class="static-preloader__brand">Bloodify</span>
            <span class="static-title-blood">247</span>
          </h1>
          <p class="static-preloader__tagline">
            <a href="https://www.graffixinnovation.com/" target="_blank" rel="noopener noreferrer">A project of GraffixInnovation</a>
          </p>
        </div>
      </div>

      <div class="static-preloader__bar" aria-hidden="true">
        <span class="static-preloader__bar-fill"></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
