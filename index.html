<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />

    <!-- Primary Meta -->
    <title>Bloodify247 - Blood Donation Platform</title>
    <meta name="description" content="Bloodify247 connects blood donors and seekers in Beanibazar Upazila, Sylhet. Find A+, B+, O+, AB+ blood donors, check cooldown states, and post emergency requests." />

    <!-- Mobile Browser Theme -->
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- Apple / Safari iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blood Donate" />
    <meta name="format-detection" content="telephone=yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22none%22><defs><linearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 stop-color=%22%23ef4444%22/><stop offset=%22100%25%22 stop-color=%22%23f43f5e%22/></linearGradient></defs><path d=%22M50 12C50 12 22 45 22 65C22 80.46 34.54 93 50 93C65.46 93 78 80.46 78 65C78 45 50 12 50 12Z%22 fill=%22url(%23g)%22/><path d=%22M32 65h10l4-18 5 32 4-22 4 8h9%22 stroke=%22%23ffffff%22 stroke-width=%226%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22none%22><defs><linearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 stop-color=%22%23ef4444%22/><stop offset=%22100%25%22 stop-color=%22%23f43f5e%22/></linearGradient></defs><path d=%22M50 12C50 12 22 45 22 65C22 80.46 34.54 93 50 93C65.46 93 78 80.46 78 65C78 45 50 12 50 12Z%22 fill=%22url(%23g)%22/><path d=%22M32 65h10l4-18 5 32 4-22 4 8h9%22 stroke=%22%23ffffff%22 stroke-width=%226%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect: establish early connections to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Google Fonts: loaded via <link> instead of CSS @import for non-blocking render -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />
    
    <!-- Theme check initialization to prevent flashes on reload -->
    <script>
      (function() {
        var theme = 'dark';
        try {
          theme = localStorage.getItem('theme') || 'dark';
        } catch (e) {}
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static preloader to display instantly during bundle download (eliminates white screen) -->
      <div class="static-preloader" style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        transition: background-color 0.3s ease;
      ">
        <!-- Decorative background glows -->
        <div style="
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 320px;
          height: 320px;
          background-color: rgba(239, 68, 68, 0.1);
          border-radius: 50%;
          filter: blur(100px);
          pointer-events: none;
        "></div>
        <div style="
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 192px;
          height: 192px;
          background-color: rgba(244, 63, 94, 0.1);
          border-radius: 50%;
          filter: blur(60px);
          pointer-events: none;
        "></div>

        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          max-width: 384px;
          padding: 0 24px;
          text-align: center;
          z-index: 10;
        ">
          <!-- Pulsing logo container -->
          <div style="
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 96px;
            height: 96px;
            margin-bottom: 32px;
          ">
            <!-- Ping ripple -->
            <div class="static-ping" style="
              position: absolute;
              inset: -4px;
              border-radius: 50%;
              background-color: rgba(239, 68, 68, 0.3);
            "></div>
            <!-- Pulse ripple -->
            <div class="static-pulse" style="
              position: absolute;
              inset: -16px;
              border-radius: 50%;
              background-color: rgba(239, 68, 68, 0.1);
            "></div>
            <!-- Heart Container -->
            <div style="
              position: relative;
              display: flex;
              align-items: center;
              justify-content: center;
              width: 80px;
              height: 80px;
              border-radius: 24px;
              background: linear-gradient(135deg, #ef4444, #f43f5e);
              box-shadow: 0 25px 50px -12px rgba(239, 68, 68, 0.3);
            ">
              <!-- Custom ECG Droplet Logo -->
              <svg class="static-bounce" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" style="width: 44px; height: 44px;">
                <path d="M50 12C50 12 22 45 22 65C22 80.46 34.54 93 50 93C65.46 93 78 80.46 78 65C78 45 50 12 50 12Z" fill="#ffffff" />
                <path d="M32 65h10l4-18 5 32 4-22 4 8h9" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
          </div>

          <!-- App Title -->
          <div style="margin-bottom: 16px;">
            <h1 style="
              font-size: 30px;
              font-weight: 900;
              letter-spacing: -0.025em;
              margin: 0 0 8px 0;
              display: flex;
              align-items: center;
              gap: 6px;
              justify-content: center;
            ">
              <span style="
                background: linear-gradient(to right, #ef4444, #f43f5e);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              ">Bloodify</span>
              <span class="static-title-blood" style="font-weight: 800; transition: color 0.3s ease;">247</span>
            </h1>
            <p class="static-pulse-text" style="
              font-size: 12px;
              font-weight: 700;
              color: rgba(239, 68, 68, 0.8);
              text-transform: uppercase;
              letter-spacing: 0.2em;
              margin: 0;
            ">
              <a href="https://www.graffixinnovation.com/" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">A project of GraffixInnovation</a>
            </p>
          </div>

          <!-- Loading Bar -->
          <div style="width: 192px; margin-top: 16px;">
            <div class="static-loading-bar-track" style="
              height: 3px;
              width: 100%;
              border-radius: 9999px;
              overflow: hidden;
              position: relative;
              transition: background-color 0.3s ease;
            ">
              <div class="static-loading-bar" style="
                height: 100%;
                width: 50%;
                background: linear-gradient(to right, #ef4444, #f43f5e);
                border-radius: 9999px;
                position: absolute;
                top: 0;
              "></div>
            </div>
            <div class="static-connecting-text" style="
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 6px;
              margin-top: 12px;
              font-size: 11px;
              font-weight: 700;
              letter-spacing: 0.05em;
              text-transform: uppercase;
              transition: color 0.3s ease;
            ">
              <span class="static-dot-pulse" style="
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background-color: #ef4444;
              "></span>
              Connecting to database...
            </div>
          </div>
        </div>
      </div>

      <style>
        /* Light mode defaults (White theme) */
        body {
          background-color: #fafafa !important;
          margin: 0;
        }
        .static-preloader {
          background-color: #fafafa !important;
        }
        .static-title-blood {
          color: #18181b !important;
        }
        .static-connecting-text {
          color: #71717a !important;
        }
        .static-loading-bar-track {
          background-color: #e4e4e7 !important;
        }

        /* Dark mode overrides (Black theme) */
        .dark body {
          background-color: #09090b !important;
        }
        .dark .static-preloader {
          background-color: #09090b !important;
        }
        .dark .static-title-blood {
          color: #f4f4f5 !important;
        }
        .dark .static-connecting-text {
          color: #a1a1aa !important;
        }
        .dark .static-loading-bar-track {
          background-color: #27272a !important;
        }

        @keyframes staticPing {
          0% { transform: scale(1); opacity: 0.75; }
          100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes staticPulse {
          0%, 100% { transform: scale(1); opacity: 0.5; }
          50% { transform: scale(1.1); opacity: 0.8; }
        }
        @keyframes staticBounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }
        @keyframes staticBar {
          0% { left: -100%; width: 50%; }
          50% { left: 25%; width: 70%; }
          100% { left: 100%; width: 50%; }
        }
        .static-ping {
          animation: staticPing 1.2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        .static-pulse, .static-dot-pulse {
          animation: staticPulse 1.5s ease-in-out infinite;
        }
        .static-pulse-text {
          animation: staticPulse 2s ease-in-out infinite;
        }
        .static-bounce {
          animation: staticBounce 0.6s ease-in-out infinite;
        }
        .static-loading-bar {
          animation: staticBar 1.5s ease-in-out infinite;
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
